openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dynasties API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shipments
    description: Shipment operations
  - name: entities
    description: Entity operations
  - name: documents
    description: Document and email operations
  - name: events
    description: Event log operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /shipments:
    get:
      operationId: listShipments
      tags: [shipments]
      summary: List shipments with enriched summaries
      responses:
        "200":
          description: List of shipments with compliance/risk/insurance summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EnrichedShipment"
                required:
                  - data
  /shipments/{id}:
    get:
      operationId: getShipment
      tags: [shipments]
      summary: Get a shipment by ID with resolved parties
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment details with resolved entity data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ShipmentDetail"
                required:
                  - data
        "404":
          description: Shipment not found
  /shipments/{id}/compliance:
    get:
      operationId: getShipmentCompliance
      tags: [shipments]
      summary: Get compliance screening for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Compliance screening data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceScreening"
                required:
                  - data
  /shipments/{id}/risk:
    get:
      operationId: getShipmentRisk
      tags: [shipments]
      summary: Get risk score for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk score data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RiskScore"
  /shipments/{id}/insurance:
    get:
      operationId: getShipmentInsurance
      tags: [shipments]
      summary: Get insurance quote for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Insurance quote data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/InsuranceQuote"
  /shipments/{id}/documents:
    get:
      operationId: getShipmentDocuments
      tags: [shipments]
      summary: Get linked documents for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Linked documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkedDocument"
                required:
                  - data
  /shipments/{id}/corrections:
    get:
      operationId: getShipmentCorrections
      tags: [shipments]
      summary: Get operator correction history for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Correction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OperatorCorrection"
                required:
                  - data
  /shipments/{id}/events:
    get:
      operationId: getShipmentEvents
      tags: [shipments]
      summary: Get event log for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                required:
                  - data
  /shipments/{id}/approve:
    post:
      operationId: approveShipment
      tags: [shipments]
      summary: Approve a DRAFT shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Shipment approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalResult"
                required:
                  - data
        "400":
          description: Invalid status transition
        "404":
          description: Shipment not found
  /shipments/{id}/reject:
    post:
      operationId: rejectShipment
      tags: [shipments]
      summary: Reject a DRAFT shipment with reason
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Shipment rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RejectionResult"
                required:
                  - data
        "400":
          description: Invalid status transition
        "404":
          description: Shipment not found
  /shipments/{id}/fields:
    patch:
      operationId: updateShipmentFields
      tags: [shipments]
      summary: Edit shipment fields with operator corrections
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties: true
                userId:
                  type: string
              required:
                - fields
      responses:
        "200":
          description: Fields updated with correction records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FieldUpdateResult"
                required:
                  - data
        "400":
          description: Invalid or non-editable fields
        "404":
          description: Shipment not found
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List entities
      responses:
        "200":
          description: List of entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entity"
                required:
                  - data
  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get an entity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Entity"
                required:
                  - data
        "404":
          description: Entity not found
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List ingested documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestedDocument"
                required:
                  - data
  /emails:
    get:
      operationId: listEmails
      tags: [documents]
      summary: List ingested emails
      responses:
        "200":
          description: List of emails
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestedEmail"
                required:
                  - data
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                required:
                  - data
  /shipments/{id}/charges:
    get:
      operationId: getShipmentCharges
      tags: [shipments]
      summary: Get charges for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of charges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShipmentCharge"
                required:
                  - data
  /shipments/{id}/invoice:
    get:
      operationId: getShipmentInvoice
      tags: [shipments]
      summary: Get invoice for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
                required:
                  - data
        "404":
          description: No invoice found
  /invoices:
    get:
      operationId: listInvoices
      tags: [shipments]
      summary: List all invoices
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
                required:
                  - data
  /rate-tables:
    get:
      operationId: listRateTables
      tags: [shipments]
      summary: List rate table entries
      responses:
        "200":
          description: List of rate table entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RateTableEntry"
                required:
                  - data
    post:
      operationId: createRateTableEntry
      tags: [shipments]
      summary: Create a rate table entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRateTableEntry"
      responses:
        "201":
          description: Rate table entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RateTableEntry"
                required:
                  - data
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    EntitySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    ComplianceSummary:
      type: object
      properties:
        status:
          type: string
          enum: [CLEAR, ALERT, BLOCKED]
        matchCount:
          type: integer
        screenedParties:
          type: integer
      required:
        - status
        - matchCount
        - screenedParties
    RiskSummary:
      type: object
      properties:
        compositeScore:
          type: number
        recommendedAction:
          type: string
          enum: [AUTO_APPROVE, OPERATOR_REVIEW, ESCALATE]
      required:
        - compositeScore
        - recommendedAction
    InsuranceSummary:
      type: object
      properties:
        coverageType:
          type: string
          enum: [ALL_RISK, NAMED_PERILS, TOTAL_LOSS]
        estimatedPremium:
          type: number
        currency:
          type: string
      required:
        - coverageType
        - estimatedPremium
    EnrichedShipment:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, IN_TRANSIT, DELIVERED, CLOSED, CANCELLED]
        shipperId:
          type: string
          nullable: true
        consigneeId:
          type: string
          nullable: true
        portOfLoading:
          type: string
          nullable: true
        portOfDischarge:
          type: string
          nullable: true
        vessel:
          type: string
          nullable: true
        voyage:
          type: string
          nullable: true
        commodity:
          type: string
          nullable: true
        hsCode:
          type: string
          nullable: true
        grossWeight:
          type: number
          nullable: true
        freightTerms:
          type: string
          nullable: true
        bookingNumber:
          type: string
          nullable: true
        blNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shipper:
          $ref: "#/components/schemas/EntitySummary"
          nullable: true
        consignee:
          $ref: "#/components/schemas/EntitySummary"
          nullable: true
        compliance:
          $ref: "#/components/schemas/ComplianceSummary"
          nullable: true
        risk:
          $ref: "#/components/schemas/RiskSummary"
          nullable: true
        insurance:
          $ref: "#/components/schemas/InsuranceSummary"
          nullable: true
      required:
        - id
        - companyId
        - reference
        - status
        - createdAt
        - updatedAt
    ShipmentDetail:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, IN_TRANSIT, DELIVERED, CLOSED, CANCELLED]
        shipperId:
          type: string
          nullable: true
        consigneeId:
          type: string
          nullable: true
        notifyPartyId:
          type: string
          nullable: true
        carrierId:
          type: string
          nullable: true
        portOfLoading:
          type: string
          nullable: true
        portOfDischarge:
          type: string
          nullable: true
        vessel:
          type: string
          nullable: true
        voyage:
          type: string
          nullable: true
        commodity:
          type: string
          nullable: true
        hsCode:
          type: string
          nullable: true
        grossWeight:
          type: number
          nullable: true
        weightUnit:
          type: string
          nullable: true
        volume:
          type: number
          nullable: true
        volumeUnit:
          type: string
          nullable: true
        packageCount:
          type: integer
          nullable: true
        incoterms:
          type: string
          nullable: true
        freightTerms:
          type: string
          nullable: true
        bookingNumber:
          type: string
          nullable: true
        blNumber:
          type: string
          nullable: true
        etd:
          type: string
          format: date-time
          nullable: true
        eta:
          type: string
          format: date-time
          nullable: true
        operatorNotes:
          type: string
          nullable: true
        extractionConfidence:
          type: object
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        approvedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shipper:
          $ref: "#/components/schemas/Entity"
          nullable: true
        consignee:
          $ref: "#/components/schemas/Entity"
          nullable: true
        notifyParty:
          $ref: "#/components/schemas/Entity"
          nullable: true
        carrier:
          $ref: "#/components/schemas/Entity"
          nullable: true
      required:
        - id
        - companyId
        - reference
        - status
        - createdAt
        - updatedAt
    Shipment:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, IN_TRANSIT, DELIVERED, CLOSED, CANCELLED]
        shipperId:
          type: string
          nullable: true
        consigneeId:
          type: string
          nullable: true
        portOfLoading:
          type: string
          nullable: true
        portOfDischarge:
          type: string
          nullable: true
        vessel:
          type: string
          nullable: true
        voyage:
          type: string
          nullable: true
        commodity:
          type: string
          nullable: true
        hsCode:
          type: string
          nullable: true
        grossWeight:
          type: number
          nullable: true
        freightTerms:
          type: string
          nullable: true
        bookingNumber:
          type: string
          nullable: true
        blNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - reference
        - status
        - createdAt
        - updatedAt
    ComplianceScreening:
      type: object
      properties:
        id:
          type: string
        shipmentId:
          type: string
        status:
          type: string
          enum: [CLEAR, ALERT, BLOCKED]
        screenedParties:
          type: integer
        matchCount:
          type: integer
        matches:
          type: array
          items:
            type: object
        listsChecked:
          type: array
          items:
            type: string
        agentExplanation:
          type: string
          nullable: true
        screenedAt:
          type: string
          format: date-time
      required:
        - id
        - shipmentId
        - status
        - screenedParties
        - matchCount
    RiskScore:
      type: object
      properties:
        id:
          type: string
        shipmentId:
          type: string
        compositeScore:
          type: number
        subScores:
          type: object
        primaryRiskFactors:
          type: array
          items:
            type: object
        recommendedAction:
          type: string
          enum: [AUTO_APPROVE, OPERATOR_REVIEW, ESCALATE]
        agentExplanation:
          type: string
          nullable: true
        scoredAt:
          type: string
          format: date-time
      required:
        - id
        - shipmentId
        - compositeScore
        - recommendedAction
    InsuranceQuote:
      type: object
      properties:
        id:
          type: string
        shipmentId:
          type: string
        coverageType:
          type: string
          enum: [ALL_RISK, NAMED_PERILS, TOTAL_LOSS]
        estimatedInsuredValue:
          type: number
        estimatedPremium:
          type: number
        currency:
          type: string
        coverageRationale:
          type: string
          nullable: true
        exclusions:
          type: array
          items:
            type: string
        confidenceScore:
          type: number
        quotedAt:
          type: string
          format: date-time
      required:
        - id
        - shipmentId
        - coverageType
        - estimatedInsuredValue
        - estimatedPremium
    Entity:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        name:
          type: string
        normalizedName:
          type: string
        entityType:
          type: string
          enum: [SHIPPER, CONSIGNEE, CARRIER, NOTIFY_PARTY, FORWARDER, AGENT, VENDOR, CUSTOMER]
        status:
          type: string
          enum: [VERIFIED, UNVERIFIED]
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - name
        - entityType
        - status
        - createdAt
        - updatedAt
    IngestedDocument:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        emailId:
          type: string
          nullable: true
        fileName:
          type: string
        mimeType:
          type: string
        documentType:
          type: string
        extractionStatus:
          type: string
          enum: [PENDING, PROCESSING, EXTRACTED, FAILED]
        extractedData:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - fileName
        - documentType
        - extractionStatus
        - createdAt
    IngestedEmail:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        messageId:
          type: string
        fromAddress:
          type: string
        toAddress:
          type: string
        subject:
          type: string
          nullable: true
        attachmentCount:
          type: integer
        status:
          type: string
          enum: [RECEIVED, PROCESSING, PROCESSED, FAILED]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - messageId
        - fromAddress
        - toAddress
        - status
        - createdAt
    Event:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        eventType:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        userId:
          type: string
          nullable: true
        serviceId:
          type: string
          nullable: true
        beforeState:
          type: object
          nullable: true
        afterState:
          type: object
          nullable: true
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - eventType
        - entityType
        - entityId
        - createdAt
    LinkedDocument:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        documentType:
          type: string
        extractionStatus:
          type: string
          enum: [PENDING, PROCESSING, EXTRACTED, FAILED]
        extractedData:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        shipmentDocumentId:
          type: string
        linkedDocumentType:
          type: string
          nullable: true
      required:
        - id
        - companyId
        - fileName
        - documentType
        - extractionStatus
        - createdAt
    OperatorCorrection:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        shipmentId:
          type: string
        fieldName:
          type: string
        originalValue:
          nullable: true
        correctedValue:
          nullable: true
        originalConfidence:
          type: number
          nullable: true
        correctedBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - shipmentId
        - fieldName
        - correctedBy
        - createdAt
    ApprovalResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [APPROVED]
        approvedAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - approvedAt
    RejectionResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [REJECTED]
        reason:
          type: string
          nullable: true
      required:
        - id
        - status
    FieldUpdateResult:
      type: object
      properties:
        id:
          type: string
        corrections:
