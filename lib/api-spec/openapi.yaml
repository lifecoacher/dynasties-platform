openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dynasties API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: admin
    description: Admin operations (ADMIN role required)
  - name: shipments
    description: Shipment operations
  - name: entities
    description: Entity operations
  - name: documents
    description: Document and email operations
  - name: events
    description: Event log operations
  - name: exceptions
    description: Exception management operations
  - name: trade-lanes
    description: Trade lane intelligence operations
  - name: claims
    description: Claims management operations

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /healthz/ready:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
                required:
                  - data
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
                required:
                  - data
        "401":
          description: Not authenticated
  /admin/companies:
    get:
      operationId: listCompanies
      tags: [admin]
      summary: List all companies (ADMIN only)
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Company"
                required:
                  - data
    post:
      operationId: createCompany
      tags: [admin]
      summary: Create a new company (ADMIN only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Company"
                required:
                  - data
        "409":
          description: Slug already exists
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (ADMIN only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
                required:
                  - data
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user (ADMIN only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserSummary"
                required:
                  - data
        "409":
          description: Email already exists
  /shipments:
    get:
      operationId: listShipments
      tags: [shipments]
      summary: List shipments with enriched summaries
      responses:
        "200":
          description: List of shipments with compliance/risk/insurance summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EnrichedShipment"
                required:
                  - data
  /shipments/{id}:
    get:
      operationId: getShipment
      tags: [shipments]
      summary: Get a shipment by ID with resolved parties
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment details with resolved entity data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ShipmentDetail"
                required:
                  - data
        "404":
          description: Shipment not found
  /shipments/{id}/compliance:
    get:
      operationId: getShipmentCompliance
      tags: [shipments]
      summary: Get compliance screening for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Compliance screening data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceScreening"
                required:
                  - data
  /shipments/{id}/risk:
    get:
      operationId: getShipmentRisk
      tags: [shipments]
      summary: Get risk score for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk score data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RiskScore"
  /shipments/{id}/insurance:
    get:
      operationId: getShipmentInsurance
      tags: [shipments]
      summary: Get insurance quote for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Insurance quote data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/InsuranceQuote"
  /shipments/{id}/documents:
    get:
      operationId: getShipmentDocuments
      tags: [shipments]
      summary: Get linked documents for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Linked documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkedDocument"
                required:
                  - data
  /shipments/{id}/corrections:
    get:
      operationId: getShipmentCorrections
      tags: [shipments]
      summary: Get operator correction history for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Correction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OperatorCorrection"
                required:
                  - data
  /shipments/{id}/events:
    get:
      operationId: getShipmentEvents
      tags: [shipments]
      summary: Get event log for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                required:
                  - data
  /shipments/{id}/approve:
    post:
      operationId: approveShipment
      tags: [shipments]
      summary: Approve a DRAFT shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Shipment approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ApprovalResult"
                required:
                  - data
        "400":
          description: Invalid status transition
        "404":
          description: Shipment not found
  /shipments/{id}/reject:
    post:
      operationId: rejectShipment
      tags: [shipments]
      summary: Reject a DRAFT shipment with reason
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Shipment rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RejectionResult"
                required:
                  - data
        "400":
          description: Invalid status transition
        "404":
          description: Shipment not found
  /shipments/{id}/fields:
    patch:
      operationId: updateShipmentFields
      tags: [shipments]
      summary: Edit shipment fields with operator corrections
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties: true
                userId:
                  type: string
              required:
                - fields
      responses:
        "200":
          description: Fields updated with correction records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/FieldUpdateResult"
                required:
                  - data
        "400":
          description: Invalid or non-editable fields
        "404":
          description: Shipment not found
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List entities
      responses:
        "200":
          description: List of entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entity"
                required:
                  - data
  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get an entity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Entity"
                required:
                  - data
        "404":
          description: Entity not found
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List ingested documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestedDocument"
                required:
                  - data
  /emails:
    get:
      operationId: listEmails
      tags: [documents]
      summary: List ingested emails
      responses:
        "200":
          description: List of emails
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/IngestedEmail"
                required:
                  - data
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                required:
                  - data
  /shipments/{id}/charges:
    get:
      operationId: getShipmentCharges
      tags: [shipments]
      summary: Get charges for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of charges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ShipmentCharge"
                required:
                  - data
  /shipments/{id}/invoice:
    get:
      operationId: getShipmentInvoice
      tags: [shipments]
      summary: Get invoice for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
                required:
                  - data
        "404":
          description: No invoice found
  /invoices:
    get:
      operationId: listInvoices
      tags: [shipments]
      summary: List all invoices
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
                required:
                  - data
  /shipments/{id}/exceptions:
    get:
      operationId: getShipmentExceptions
      tags: [exceptions]
      summary: Get exceptions for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of exceptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Exception"
                required:
                  - data
  /exceptions:
    get:
      operationId: listExceptions
      tags: [exceptions]
      summary: List all exceptions
      responses:
        "200":
          description: List of exceptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Exception"
                required:
                  - data
  /exceptions/{id}:
    get:
      operationId: getException
      tags: [exceptions]
      summary: Get an exception by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exception details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Exception"
                required:
                  - data
        "404":
          description: Exception not found
    patch:
      operationId: updateException
      tags: [exceptions]
      summary: Update exception status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateException"
      responses:
        "200":
          description: Updated exception
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Exception"
                required:
                  - data
        "404":
          description: Exception not found
  /trade-lanes:
    get:
      operationId: listTradeLanes
      tags: [trade-lanes]
      summary: List trade lane stats
      responses:
        "200":
          description: List of trade lane stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TradeLaneStat"
                required:
                  - data
  /trade-lanes/{id}:
    get:
      operationId: getTradeLane
      tags: [trade-lanes]
      summary: Get a trade lane by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trade lane details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TradeLaneStat"
                required:
                  - data
        "404":
          description: Trade lane not found
  /shipments/{id}/claims:
    get:
      operationId: getShipmentClaims
      tags: [claims]
      summary: Get claims for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Claim"
                required:
                  - data
    post:
      operationId: createClaim
      tags: [claims]
      summary: File a new claim for a shipment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaim"
      responses:
        "202":
          description: Claim processing started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ClaimAccepted"
                required:
                  - data
        "400":
          description: Missing required fields
        "404":
          description: Shipment not found
  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List all claims
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Claim"
                required:
                  - data
  /claims/{id}:
    get:
      operationId: getClaim
      tags: [claims]
      summary: Get a claim by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claim details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
                required:
                  - data
        "404":
          description: Claim not found
    patch:
      operationId: updateClaim
      tags: [claims]
      summary: Update claim status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, DENIED, CLOSED]
      responses:
        "200":
          description: Updated claim
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Claim"
                required:
                  - data
        "404":
          description: Claim not found
  /claims/{id}/communications:
    get:
      operationId: getClaimCommunications
      tags: [claims]
      summary: Get communications for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of communications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClaimCommunication"
                required:
                  - data
  /rate-tables:
    get:
      operationId: listRateTables
      tags: [shipments]
      summary: List rate table entries
      responses:
        "200":
          description: List of rate table entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RateTableEntry"
                required:
                  - data
    post:
      operationId: createRateTableEntry
      tags: [shipments]
      summary: Create a rate table entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRateTableEntry"
      responses:
        "201":
          description: Rate table entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RateTableEntry"
                required:
                  - data
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        environment:
          type: string
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              latencyMs:
                type: number
              error:
                type: string
                nullable: true
        memory:
          type: object
          properties:
            rss:
              type: number
            heapUsed:
              type: number
            heapTotal:
              type: number
      required:
        - status
    EntitySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    ComplianceSummary:
      type: object
      properties:
        status:
          type: string
          enum: [CLEAR, ALERT, BLOCKED]
        matchCount:
          type: integer
        screenedParties:
          type: integer
      required:
        - status
        - matchCount
        - screenedParties
    RiskSummary:
      type: object
      properties:
        compositeScore:
          type: number
        recommendedAction:
          type: string
          enum: [AUTO_APPROVE, OPERATOR_REVIEW, ESCALATE]
      required:
        - compositeScore
        - recommendedAction
    InsuranceSummary:
      type: object
      properties:
        coverageType:
          type: string
          enum: [ALL_RISK, NAMED_PERILS, TOTAL_LOSS]
        estimatedPremium:
          type: number
        currency:
          type: string
      required:
        - coverageType
        - estimatedPremium
    EnrichedShipment:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
        reference:
          type: string
        status:
          type: string
          enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, IN_TRANSIT, DELIVERED, CLOSED, CANCELLED]
        shipperId:
          type: string
          nullable: true
        consigneeId:
          type: string
          nullable: true
        portOfLoading:
          type: string
          nullable: true
        portOfDischarge:
          type: string
          nullable: true
        vessel:
          type: string
          nullable: true
        voyage:
          type: string
          nullable: true
        commodity:
          type: string
          nullable: true
        hsCode:
          type: string
          nullable: true
        grossWeight:
          type: number
          nullable: true
        freightTerms:
          type: string
          nullable: true
        bookingNumber:
          type: string
          nullable: true
        blNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shipper:
          $ref: "#/components/schemas/EntitySummary"
          nullable: true
        consignee:
          $ref: "#/components/schemas/EntitySummary"
          nullable: true
        compliance:
          $ref: "#/components/schemas/ComplianceSummary"
          nullable: true
        risk:
          $ref: "#/components/schemas/RiskSummary"
          nullable: true
        insurance:
          $ref: "#/components/schemas/InsuranceSummary"
          nullable: true
      required:
        - id
        - companyId
        - reference
        - status
        - createdAt
        - updatedAt
    ShipmentDetail:
      type: object
      properties:
        id:
          type: string
        companyId:
          type: string
