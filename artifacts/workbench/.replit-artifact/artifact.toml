kind = "web"
previewPath = "/"
title = "Operator Workbench"
version = "1.0.0"
id = "artifacts/workbench"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22653
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/workbench run dev"

[services.env]
PORT = "22653"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/workbench", "run", "build"]
publicDir = "artifacts/workbench/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
